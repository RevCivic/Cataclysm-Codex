services:
  codex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cataclysm-codex
    ports:
      - "3000:3000"
    volumes:
      # Persist the JSON database across container restarts
      - codex-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/db.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  codex-data:
    driver: local
