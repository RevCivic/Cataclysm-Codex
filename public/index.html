<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cataclysm Codex — Starfinder Campaign</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">☄</div>
        <h1>Cataclysm<br/><span>Codex</span></h1>
        <p class="subtitle">Starfinder 1e Campaign</p>
      </div>
      <nav id="main-nav">
        <button class="nav-btn active" data-section="people">
          <span class="nav-icon">👤</span> People
        </button>
        <button class="nav-btn" data-section="species">
          <span class="nav-icon">🌌</span> Species
        </button>
        <button class="nav-btn" data-section="parties">
          <span class="nav-icon">⚔</span> Parties
        </button>
        <button class="nav-btn" data-section="factions">
          <span class="nav-icon">🏴</span> Factions
        </button>
        <button class="nav-btn" data-section="weapons">
          <span class="nav-icon">🔫</span> Weapons
        </button>
        <button class="nav-btn" data-section="starships">
          <span class="nav-icon">🚀</span> Starships
        </button>
        <button class="nav-btn" data-section="armors">
          <span class="nav-icon">🛡</span> Armors
        </button>
        <button class="nav-btn" data-section="timeline">
          <span class="nav-icon">📅</span> Timeline
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Section Header -->
      <header id="section-header">
        <div class="header-left">
          <h2 id="section-title">People</h2>
          <span id="record-count" class="badge">0</span>
        </div>
        <div class="header-right">
          <input type="text" id="search-input" placeholder="Search..." />
          <button id="add-btn" class="btn btn-primary">+ Add Entry</button>
        </div>
      </header>

      <!-- Cards Grid -->
      <div id="cards-container" class="cards-grid"></div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="hidden">
    <div id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="modal-title">Add Entry</h3>
        <button id="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="modal-form">
        <div id="form-fields"></div>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="modal-save" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-overlay" class="hidden">
    <div id="detail-modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 id="detail-title">Details</h3>
        <button id="detail-close" aria-label="Close">&times;</button>
      </div>
      <div id="detail-body"></div>
      <div class="modal-actions">
        <button id="detail-edit" class="btn btn-secondary">✏ Edit</button>
        <button id="detail-delete" class="btn btn-danger">🗑 Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
